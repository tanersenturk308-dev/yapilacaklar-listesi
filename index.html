<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>

     <div class="container">
        
        <div class="wrapper">
            <h1 class="title">Yapılacaklar Listesi</h1>
        <form class="add-form">
            <input type="text" class="add-input" placeholder="Görev Ekle...">
            <button type="submit" class="add-btn">Görev Ekle</button>
        </form>
         <div class="alert">Henüz bir görev girmediniz</div>
        <div class="btn-filter">
            <button complete="All" class="btn-selected">Hepsi</button>
            <button complete="Incomplete" class="btn-default">Tamamlanmayanlar</button>
            <button complete="Completed" class="btn-default">Tamamlananlar</button>
        </div>
        
        <ul class="items">
           

           
        </ul>

       

        <button class="remove-btn">Tümünü Sil</button>
        </div>
          
     </div>
    
    
      

   <script src="script.js"></script>
</body>
</html>
